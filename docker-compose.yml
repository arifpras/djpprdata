services:
  dashboard:
    build:
      context: .
      dockerfile: design/apps/web/Dockerfile
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DASHBOARD_WORKSPACE_ROOT: /app
      BOND_PREDICT_PYTHON: /opt/venv/bin/python
      SQLITE_DB_PATH: /app/data/Database_Domestik_Internasional.db
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.2}
      OPENAI_MAX_OUTPUT_TOKENS: ${OPENAI_MAX_OUTPUT_TOKENS:-2400}
    volumes:
      - ./data:/app/data:ro
      - ./model:/app/model:ro
    restart: unless-stopped
