services:
  - type: web
    name: perisai-dashboard
    runtime: docker
    dockerfilePath: ./design/apps/web/Dockerfile
    dockerContext: .
    plan: starter
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DASHBOARD_WORKSPACE_ROOT
        value: /app
      - key: BOND_PREDICT_PYTHON
        value: /opt/venv/bin/python
      - key: SQLITE_DB_PATH
        value: /app/data/Database_Domestik_Internasional.db
      - key: OPENAI_MODEL
        value: gpt-5
      - key: OPENAI_TEMPERATURE
        value: "0.2"
      - key: OPENAI_MAX_OUTPUT_TOKENS
        value: "2400"
      - key: OPENAI_API_KEY
        sync: false
