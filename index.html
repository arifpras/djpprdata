<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DJPPR Data</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
      }
      .card {
        width: min(680px, 92vw);
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        padding: 28px;
        box-sizing: border-box;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }
      p {
        margin: 0;
        line-height: 1.5;
        color: #334155;
      }
      a {
        color: #0f172a;
        font-weight: 600;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #0b1220;
          color: #e2e8f0;
        }
        .card {
          background: #111827;
          border-color: #334155;
        }
        p {
          color: #cbd5e1;
        }
        a {
          color: #f8fafc;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>DJPPR Data</h1>
      <p>
        GitHub Pages is active for this repository. For source code and project modules,
        visit <a href="https://github.com/arifpras/djpprdata">arifpras/djpprdata</a>.
      </p>
    </main>
  </body>
</html>
