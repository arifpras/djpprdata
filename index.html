<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DJPPR Data</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
      }
      .card {
        width: min(680px, 92vw);
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        padding: 28px;
        box-sizing: border-box;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }
      p {
        margin: 0;
        line-height: 1.5;
        color: #334155;
      }
      .lead {
        margin-bottom: 14px;
      }
      h2 {
        margin: 14px 0 8px;
        font-size: 16px;
      }
      ul {
        margin: 0;
        padding-left: 18px;
      }
      li {
        margin: 6px 0;
        color: #334155;
      }
      a {
        color: #0f172a;
        font-weight: 600;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #0b1220;
          color: #e2e8f0;
        }
        .card {
          background: #111827;
          border-color: #334155;
        }
        p {
          color: #cbd5e1;
        }
        li {
          color: #cbd5e1;
        }
        a {
          color: #f8fafc;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>DJPPR Data</h1>
      <p class="lead">
        Market analytics dashboard, bond pricing models, and yield-curve analysis workspace.
      </p>

      <h2>Repository</h2>
      <ul>
        <li>
          <a href="https://github.com/arifpras/djpprdata">GitHub repository</a>
        </li>
        <li>
          <a href="https://github.com/arifpras/djpprdata/blob/main/README.md">Project README</a>
        </li>
      </ul>

      <h2>Modules</h2>
      <ul>
        <li>
          <a href="https://github.com/arifpras/djpprdata/tree/main/design/apps/web">Web dashboard app</a>
        </li>
        <li>
          <a href="https://github.com/arifpras/djpprdata/tree/main/design/apps/mobile">Mobile app</a>
        </li>
        <li>
          <a href="https://github.com/arifpras/djpprdata/tree/main/model">Modeling notebooks & scripts</a>
        </li>
        <li>
          <a href="https://github.com/arifpras/djpprdata/tree/main/data">Data assets</a>
        </li>
      </ul>
    </main>
  </body>
</html>
